<!DOCTYPE html>
<html lang="en-GB" dir="ltr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Structural Anomaly | SDAP Precision Hardware</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="imgs/favicon.png">
    <link rel="stylesheet" href="sdap-new.css">
    <style>
        body { background: #000; color: #fff; overflow: hidden; }
        .error-page {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            padding: var(--space-md);
        }
        .error-code {
            font-family: var(--font-serif);
            font-size: clamp(6rem, 20vw, 15rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.05) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }
        .error-desc {
            font-family: var(--font-sans);
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: rgba(255,255,255,0.6);
            margin-bottom: 3rem;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }
        .return-btn {
            display: inline-flex; align-items: center; gap: 1rem;
            padding: 1rem 2.5rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all var(--transition-smooth);
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .return-btn:hover {
            background: transparent;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="custom-cursor">
        <div class="cursor-ring"></div>
        <div class="cursor-dot"></div>
    </div>

    <!-- Navigation -->
    <header class="site-navbar">
        <div class="nav-logo-group">
            <a href="index.html" class="nav-logo magnetic" style="color: inherit; text-decoration: none;">SDAP</a>
            <span class="nav-slogan">Bespoke Metalworks</span>
        </div>
        <a href="index.html" class="nav-menu magnetic hover-underline" style="color: inherit; text-decoration: none; margin-top: 5px;">BACK TO PORTFOLIO ✕</a>
    </header>

    <main class="error-page">
        <h1 class="error-code">404</h1>
        <p class="error-desc">The portfolio slide or component spec you are looking for has been structurally detached from our blueprints.</p>
        <a href="index.html" class="return-btn magnetic">
            Return to Showroom
            <span style="font-size: 1.2rem;">→</span>
        </a>
    </main>

    <div class="global-watermark">Bespoke Metalworks</div>

    <script>
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (!isTouchDevice) {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorRing = document.querySelector('.cursor-ring');
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            let ringX = mouseX, ringY = mouseY;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                cursorDot.style.left = `${mouseX}px`;
                cursorDot.style.top = `${mouseY}px`;
            });

            function cursorLoop() {
                ringX += (mouseX - ringX) * 0.12;
                ringY += (mouseY - ringY) * 0.12;
                cursorRing.style.left = `${ringX}px`;
                cursorRing.style.top = `${ringY}px`;
                requestAnimationFrame(cursorLoop);
            }
            requestAnimationFrame(cursorLoop);
            
            document.querySelectorAll('a, button, .magnetic').forEach(el => {
                el.addEventListener('mouseenter', () => document.body.classList.add('hovering-link'));
                el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-link'));
            });
        }
    </script>
</body>
</html>
