<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imgs/favicon.png">
    <link rel="apple-touch-icon" href="imgs/favicon.png">
    <title>Inquiry Received | SDAP Bespoke</title>
    <link rel="stylesheet" href="sdap-new.css">
    <style>
        body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .success-content { text-align: center; opacity: 0; transform: translateY(20px); }
        h1 { font-family: var(--font-serif); font-size: 3rem; font-style: italic; margin-bottom: 1.5rem; }
        p { font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.6); margin-bottom: 3rem; }
    </style>
</head>
<body>
    <div class="success-content">
        <h1>Transmission Received.</h1>
        <p>Your technical inquiry has been securely routed to our engineering board.</p>
        <a href="index.html" class="artistic-link magnetic" style="display: inline-flex;">
            Return to Showroom 
            <span class="arrow-circle">←</span>
        </a>
    </div>

    <!-- GSAP for smooth reveal -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.to('.success-content', { opacity: 1, y: 0, duration: 1.5, ease: "power4.out", delay: 0.5 });
    </script>
</body>
</html>
